{% extends 'base.html' %}

{% block title %}Admin Login - TurfEase{% endblock %}

{% block content %}
<style>
    /* Force dark theme on admin login page */
    body { background-color: #0b1120 !important; color: #cbd5e1 !important; }
    .form-container { background: #1e293b !important; border-color: #334155 !important; }
    .form-container h2 { color: #f1f5f9 !important; }
    .form-group label { color: #cbd5e1 !important; }
    .form-control { background: #1e293b !important; border-color: #334155 !important; color: #f1f5f9 !important; }
    .form-control:focus { border-color: #14b8a6 !important; background: #111827 !important; }
    .form-footer { color: #94a3b8 !important; }
</style>
<div class="container">
    <div class="form-container">
        <div class="admin-login-header" style="text-align:center; margin-bottom:24px;">
            <div style="font-size:48px; margin-bottom:8px;">&#128272;</div>
            <h2 style="margin-bottom:4px;">Admin Login</h2>
            <p style="color:#94a3b8; font-size:14px;">Access the TurfEase administration panel</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter admin password" required>
            </div>
            <button type="submit" class="btn-submit">Login to Dashboard</button>
        </form>
        <p class="form-footer">Not an admin? <a href="{% url 'login' %}">User login</a></p>
    </div>
</div>
{% endblock %}
